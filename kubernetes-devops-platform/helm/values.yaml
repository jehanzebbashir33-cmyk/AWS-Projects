"""
Kubernetes DevOps Platform — Helm Values & Deployment Configuration
Production-grade EKS deployment with RBAC, HPA, and network policies.
"""

# Helm values for the Kubernetes platform deployment
# Overrides for snaptorent-platform Helm chart

replicaCount: 3

image:
  repository: 123456789012.dkr.ecr.eu-west-2.amazonaws.com/snaptorent-platform
  pullPolicy: IfNotPresent
  tag: "1.18.0"

imagePullSecrets:
  - name: ecr-credentials

serviceAccount:
  create: true
  annotations:
    iam.amazonaws.com/role: snaptorent-platform-role
  name: snaptorent-platform

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/ssl-redirect: "true"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
  hosts:
    - host: api.snaptorent.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: snaptorent-tls
      hosts:
        - api.snaptorent.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60

nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - snaptorent-platform
          topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              name: cache
      ports:
        - protocol: TCP
          port: 6379

# External secrets via AWS Secrets Manager
externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStore:
    provider:
      aws:
        service: SecretsManager
        region: eu-west-2
        role: snaptorent-secrets-role
  secrets:
    - name: snaptorent-db-credentials
      key: snaptorent/database
      property: credentials
    - name: snaptorent-api-keys
      key: snaptorent/api-keys
      property: keys

# Monitoring
servicemonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels:
    release: prometheus

prometheusrules:
  enabled: true
  rules:
    - alert: SnaptorentHighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate on SnapToRent platform"
    - alert: SnaptorentHighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High P95 latency on SnapToRent platform"