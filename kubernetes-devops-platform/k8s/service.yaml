apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: devops
  labels:
    app: nginx
    environment: production
    managed-by: kubectl
  annotations:
    # Allow AWS Load Balancer Controller to manage the backing NLB if needed.
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
